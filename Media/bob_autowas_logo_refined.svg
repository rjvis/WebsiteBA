<svg width="500" height="180" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">

  <!-- Left background -->
  <rect x="0" y="0" width="250" height="180" fill="#4a4a4a"/>

  <!-- Asymmetrical pixel pattern (closer to original) -->
  <g transform="translate(55,35)">
    <!-- size 12 gap 10 -->

    <!-- row 1 (3 blocks) -->
    <rect x="22" y="0" width="12" height="12" fill="#6f6f6f"/>
    <rect x="44" y="0" width="12" height="12" fill="#8a8a8a"/>
    <rect x="66" y="0" width="12" height="12" fill="#6f6f6f"/>

    <!-- row 2 (4 blocks) -->
    <rect x="0" y="22" width="12" height="12" fill="#6f6f6f"/>
    <rect x="22" y="22" width="12" height="12" fill="#a5a5a5"/>
    <rect x="44" y="22" width="12" height="12" fill="#cfcfcf"/>
    <rect x="66" y="22" width="12" height="12" fill="#a5a5a5"/>

    <!-- row 3 (5 blocks, center red) -->
    <rect x="0" y="44" width="12" height="12" fill="#8a8a8a"/>
    <rect x="22" y="44" width="12" height="12" fill="#cfcfcf"/>
    <rect x="44" y="44" width="12" height="12" fill="#e30613"/>
    <rect x="66" y="44" width="12" height="12" fill="#cfcfcf"/>
    <rect x="88" y="44" width="12" height="12" fill="#8a8a8a"/>

    <!-- row 4 (4 blocks) -->
    <rect x="22" y="66" width="12" height="12" fill="#a5a5a5"/>
    <rect x="44" y="66" width="12" height="12" fill="#cfcfcf"/>
    <rect x="66" y="66" width="12" height="12" fill="#a5a5a5"/>
    <rect x="88" y="66" width="12" height="12" fill="#6f6f6f"/>

    <!-- row 5 (3 blocks offset) -->
    <rect x="44" y="88" width="12" height="12" fill="#8a8a8a"/>
    <rect x="66" y="88" width="12" height="12" fill="#6f6f6f"/>
    <rect x="88" y="88" width="12" height="12" fill="#5f5f5f"/>

  </g>

  <!-- Right shape -->
  <path d="M250,0 H480 Q500,0 500,20 V180 H250 Z" fill="#e30613"/>

  <!-- Text -->
  <text x="300" y="95" font-family="Arial Black, Arial, Helvetica, sans-serif" font-size="72" font-weight="900" fill="white">
    BOB
  </text>

  <text x="305" y="140" font-family="Arial, Helvetica, sans-serif" font-size="26" letter-spacing="4" fill="white">
    AUTOWAS
  </text>

</svg>
